<!DOCTYPE html>
<html lang="en">
    <head>
    <meta charset="UTF-8">  
    <title>Dashborad</title>

    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400" rel="stylesheet">
    <link rel="stylesheet" href="css/Job search.css">
</head>

<body>
    <nav>
        <a href="#">Dashboard</a>   
        <a href="allplication.html">Application</a>
        <a href="#">Analytics</a>
        <a href="#">Settings</a>
    </nav>

    <div class="filters">
        <h2>Filters</h2>
        <label>Location</label>
        <select>
            <option>Select</option>
        </select>

        <h2>Salary</h2>
        <label>Range</label>
        <select>
            <option>select</option>
        </select>

        <h2>Experience</h2>
        <label>Level</label>
        <select>
            <option>Select</option>
            <option>Internship</option>
            <option>Part-time</option>
            <option>Full-time</option>
        </select>

        <h2>Sponsorship</h2>
        <select>
            <option>Select</option>
            <option>CPT/OPT</option>
            <option>No sponsor</option>
            <option>H-1B</option>
        </select>

    </div>

    <main class="job-info">
        <div class="search">
            <input type="text">
            <button>Search</button>
        </div>
    
    <section class="grid">
        <div class="card">
            <h3>Google Product Manager</h3>
            <p>Seattle Remote $20/hr</p>
        </div>

        <div class="card">
            <h3>Amazon Software Engineer</h3>
            <p>Seattle $25/hr</p>
        </div>

        <div class="card">
            <h3>UW Teaching Assistant</h3>
            <p>Seattle $21/hr</p>
        </div>

    </section>
    </main>
</body>
</html>
