<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Log in or create a JobTrack account.">
  <title>JobTrack | Log In or Sign Up</title>
  <link rel="icon" href="img/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-layout">
      <a class="site-title" href="landing.html">JobTrack</a>
      <nav aria-label="Main navigation" class="top-nav">
        <a href="landing.html">Landing</a>
        <a href="auth.html">Log In / Sign Up</a>
        <a href="index.html">Dashboard</a>
        <a href="jobs.html">Jobs</a>
        <a href="applications.html">Applications</a>
        <a href="analytics.html">Analytics</a>
      </nav>
    </div>
  </header>
  <main class="container page-section">
    <h1>Log In or Sign Up</h1>
    <p class="muted-text">This static mockup shows the account view a user would see before entering the dashboard.</p>

    <div class="auth-grid">
      <section class="card">
        <h2>Log In</h2>
        <form class="form-stack" action="index.html">
          <div class="form-row">
            <label for="login-email">Email</label>
            <input id="login-email" name="login-email" type="email" placeholder="you@example.com">
          </div>
          <div class="form-row">
            <label for="login-password">Password</label>
            <input id="login-password" name="login-password" type="password" placeholder="Password">
          </div>
          <button class="button" type="submit">Log In</button>
        </form>
      </section>

      <section class="card">
        <h2>Sign Up</h2>
        <form class="form-stack" action="index.html">
          <div class="form-row">
            <label for="signup-name">Name</label>
            <input id="signup-name" name="signup-name" type="text" placeholder="Your name">
          </div>
          <div class="form-row">
            <label for="signup-email">Email</label>
            <input id="signup-email" name="signup-email" type="email" placeholder="you@example.com">
          </div>
          <div class="form-row">
            <label for="signup-password">Password</label>
            <input id="signup-password" name="signup-password" type="password" placeholder="Create a password">
          </div>
          <div class="form-row">
            <label for="confirm-password">Confirm Password</label>
            <input id="confirm-password" name="confirm-password" type="password" placeholder="Confirm password">
          </div>
          <button class="button" type="submit">Create Account</button>
        </form>
      </section>
    </div>
  </main>
  <footer class="site-footer">
    <div class="container footer-layout">
      <p>&copy; 2026 JobTrack</p>
      <nav aria-label="Footer navigation" class="footer-nav">
        <a href="landing.html">Landing</a>
        <a href="index.html">Dashboard</a>
        <a href="jobs.html">Jobs</a>
        <a href="applications.html">Applications</a>
        <a href="analytics.html">Analytics</a>
      </nav>
    </div>
  </footer>
</body>
</html>
